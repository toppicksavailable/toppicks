<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Everyday Deals</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#faf9f7;
  color:#3a3a3a;
}

/* HEADER */
header{
  padding:16px 20px;
  background:#fff;
  position:sticky;
  top:0;
  z-index:100;
  box-shadow:0 3px 8px #0001;
  border-bottom:1px solid #f0ebe6;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.logo{
  font-size:18px;
  font-weight:700;
}
#search{
  flex:1;
  margin-left:12px;
  padding:9px 12px;
  border:1px solid #e6ddd4;
  border-radius:999px;
  background:#fdfbf8;
  font-size:13px;
}

/* HERO */
.hero{
  padding:26px 18px;
  text-align:center;
  background:#f3ede6;
}
.hero h1{
  margin:0;
  font-size:18px;
  font-weight:700;
}
.hero p{
  margin:8px 0 0;
  font-size:13px;
  color:#5a5a5a;
}

/* CATEGORY CHIPS */
.chips{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
  margin:14px;
}
.chip{
  padding:6px 11px;
  background:#f3ede6;
  border-radius:999px;
  font-size:11px;
  cursor:pointer;
}

/* PRODUCT GRID */
.products{
  padding:14px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:12px;
}
.card{
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 3px 8px #0001;
}
.card img{
  width:100%;
  height:140px;
  object-fit:cover;
}
.card .info{
  padding:9px;
}
.card .title{
  font-size:13px;
  font-weight:600;
  margin-bottom:4px;
}
.card .desc{
  font-size:11px;
  color:#6a6a6a;
  margin-bottom:4px;
}
.card .price{
  font-size:11px;
  color:#444;
}

#nores{
  text-align:center;
  padding:18px;
  display:none;
  color:#7a7a7a;
  font-size:12px;
}
</style>
</head>

<body>

<header>
  <div class="logo">EVERYDAY DEALS</div>
  <input id="search" placeholder="Search products...">
</header>

<div class="hero">
  <h1>COZY ESSENTIALS FOR EVERYDAY LIVING</h1>
  <p>Curated finds in baby, tech, home, and gaming.</p>
</div>

<div class="chips">
  <div class="chip" data-cat="all">All</div>
  <div class="chip" data-cat="baby">Baby</div>
  <div class="chip" data-cat="tech">Tech</div>
  <div class="chip" data-cat="home">Home</div>
  <div class="chip" data-cat="gaming">Gaming</div>
</div>

<div class="products" id="products"></div>
<div id="nores">No matching products found.</div>

<script>
/* STABLE COZY-BEIGE CDN IMAGES */
const IMAGES = {
  blanket: "https://images.unsplash.com/photo-1604335399105-7a4d7a8f4e70?auto=format&fit=crop&w=600&q=80",
  swaddle: "https://images.unsplash.com/photo-1617038260897-1e94c3b5c832?auto=format&fit=crop&w=600&q=80",
  speaker: "https://images.unsplash.com/photo-1585386959984-a4155224a1a1?auto=format&fit=crop&w=600&q=80",
  stand: "https://images.unsplash.com/photo-1587829741301-dc798b83add3?auto=format&fit=crop&w=600&q=80",
  diffuser: "https://images.unsplash.com/photo-1600172454132-5c4f0e90a962?auto=format&fit=crop&w=600&q=80",
  pillow: "https://images.unsplash.com/photo-1616628182509-1e0adf7eecca?auto=format&fit=crop&w=600&q=80",
  mouse: "https://images.unsplash.com/photo-1587825140708-8a9f7f4c8ad5?auto=format&fit=crop&w=600&q=80",
  keyboard: "https://images.unsplash.com/photo-1587829741301-1e8b98cbfbac?auto=format&fit=crop&w=600&q=80"
};

/* PRODUCT LIST */
const PRODUCTS=[
  {cat:"baby",title:"Cozy Baby Blanket",img:IMAGES.blanket,desc:"Soft, warm, and gentle.",price:"Price varies"},
  {cat:"baby",title:"Neutral Swaddle",img:IMAGES.swaddle,desc:"Calming beige wrap.",price:"Price varies"},
  {cat:"tech",title:"Mini Speaker",img:IMAGES.speaker,desc:"Warm, clear sound.",price:"Price varies"},
  {cat:"tech",title:"Phone Stand",img:IMAGES.stand,desc:"Soft-touch angle support.",price:"Price varies"},
  {cat:"home",title:"Aroma Diffuser",img:IMAGES.diffuser,desc:"Cozy mist for calm spaces.",price:"Price varies"},
  {cat:"home",title:"Throw Pillow",img:IMAGES.pillow,desc:"Soft beige comfort.",price:"Price varies"},
  {cat:"gaming",title:"Gaming Mouse",img:IMAGES.mouse,desc:"Smooth and responsive.",price:"Price varies"},
  {cat:"gaming",title:"Keyboard",img:IMAGES.keyboard,desc:"Compact and tactile.",price:"Price varies"}
];

/* RENDERING */
const productBox=document.getElementById("products");
const nores=document.getElementById("nores");

function showProducts(cat="all",q=""){
  productBox.innerHTML="";
  let list=PRODUCTS.filter(p=>
    (cat==="all"||p.cat===cat) &&
    (!q||p.title.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q))
  );

  nores.style.display=list.length?"none":"block";

  list.forEach(p=>{
    let c=document.createElement("div");
    c.className="card";
    c.innerHTML=
      `<img src="${p.img}">
       <div class="info">
         <div class="title">${p.title}</div>
         <div class="desc">${p.desc}</div>
         <div class="price">${p.price}</div>
       </div>`;
    productBox.appendChild(c);
  });
}

/* INITIAL LOAD */
let currentCat="all";
showProducts();

/* CATEGORY FILTERS */
document.querySelectorAll(".chip").forEach(ch=>{
  ch.onclick=()=>{
    currentCat=ch.dataset.cat;
    showProducts(currentCat,search.value.trim().toLowerCase());
  };
});

/* SEARCH */
search.oninput=()=>showProducts(currentCat,search.value.trim().toLowerCase());
</script>

</body>
</html>
