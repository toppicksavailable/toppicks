<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dakota’s Amazon Picks</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #ffffff;
            color: #333;
        }

        /* Header */
        header {
            background: #ffffff;
            padding: 26px;
            box-shadow: 0 2px 14px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h2 {
            margin: 0;
            font-weight: 700;
            color: #444;
        }

        nav {
            display: flex;
            gap: 22px;
        }

        nav a {
            text-decoration: none;
            color: #555;
            font-weight: 600;
            transition: 0.2s;
        }

        nav a:hover {
            color: #8aa899;
        }

        /* SEARCH BAR */
        #searchBar {
            padding: 14px 20px;
            width: 260px;
            border-radius: 14px;
            border: 2px solid #e6e2d8;
            background: #fdfbf7;
            font-size: 16px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.06);
            transition: 0.25s;
        }

        #searchBar:focus {
            border-color: #cfc7b8;
            background: #ffffff;
            outline: none;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        /* Hero */
        .hero {
            background: #ffffff;
            text-align: center;
            padding: 90px 20px;
            border-bottom: 1px solid #f3f3f3;
        }

        .hero h1 {
            font-size: 46px;
            margin-bottom: 12px;
            color: #444;
        }

        .hero p {
            font-size: 18px;
            color: #666;
        }

        /* Category Buttons */
        #categories {
            text-align: center;
            padding: 40px 20px;
        }

        .cat-btn {
            padding: 12px 22px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            margin: 6px;
            font-size: 15px;
        }

        .cat-btn[data-cat="baby"] { background: #d8e7f7; color:#3a4a5a; }
        .cat-btn[data-cat="tech"] { background: #e8ddf7; color:#4a3f5a; }
        .cat-btn[data-cat="home"] { background: #dff2e4; color:#3a5a46; }
        .cat-btn[data-cat="gaming"] { background: #f7e4d1; color:#5a463a; }

        .cat-btn:hover {
            opacity: 0.9;
        }

        /* Product Grid */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 26px;
            padding: 50px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .product-card {
            background: #ffffff;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 3px 12px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.25s;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeIn 0.6s ease forwards;
        }

        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }

        .product-card img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 14px;
        }

        .product-card h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #444;
        }

        .product-card p {
            font-size: 15px;
            color: #666;
            margin-bottom: 16px;
        }

        .product-card a {
            display: inline-block;
            padding: 10px 18px;
            background: #8aa899;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .product-card a:hover {
            background: #7a9688;
        }

        /* Fade-in animation */
        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

<header>
    <h2>Dakota’s Amazon Picks</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#categories">Categories</a>
        <a href="#products">Products</a>
    </nav>
</header>

<section class="hero">
    <h1>Cozy, Clean & Colorful Finds</h1>
    <p>Your curated picks for Baby, Tech, Home & Gaming</p>
    <br>
    <input type="text" id="searchBar" placeholder="Search products...">
</section>

<section id="categories">
    <button class="cat-btn" data-cat="baby">Baby</button>
    <button class="cat-btn" data-cat="tech">Tech</button>
    <button class="cat-btn" data-cat="home">Home</button>
    <button class="cat-btn" data-cat="gaming">Gaming</button>
</section>

<section id="products" class="products">
    <!-- Example Product -->
    <div class="product-card" data-cat="baby">
        <img src="https://via.placeholder.com/300x200" alt="Product">
        <h3>Sample Baby Product</h3>
        <p>Cozy, safe, and parent-approved.</p>
        <a href="#">View on Amazon</a>
    </div>
</section>

<script>
    // Category Filter
    const buttons = document.querySelectorAll(".cat-btn");
    const cards = document.querySelectorAll(".product-card");

    buttons.forEach(btn => {
        btn.addEventListener("click", () => {
            const category = btn.dataset.cat;
            cards.forEach(card => {
                card.style.display = card.dataset.cat === category ? "block" : "none";
            });
        });
    });

    // Search Filter
    const searchBar = document.getElementById("searchBar");
    searchBar.addEventListener("input", () => {
        const term = searchBar.value.toLowerCase();
        cards.forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(term) ? "block" : "none";
        });
    });
</script>

</body>
</html>
