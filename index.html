<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Dakota’s Amazon Picks</title><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>
body{margin:0;font-family:"Segoe UI",Arial,sans-serif;background:#faf7f2;color:#333;}
main{max-width:1200px;margin:0 auto;}
header{background:#fff;padding:20px 26px;box-shadow:0 2px 14px rgba(0,0,0,0.05);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
nav{display:flex;gap:18px;}nav a{text-decoration:none;color:#555;font-weight:600;font-size:14px;}nav a:hover{color:#8aa899;}
.hero{text-align:center;padding:70px 20px 40px;background:#fdf9f3;border-bottom:1px solid #f0e8dd;}
.hero h1{font-size:40px;margin-bottom:10px;color:#444;}
.hero p{font-size:17px;color:#666;max-width:520px;margin:0 auto 20px;}
.search-wrapper{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;}
#searchBar{padding:14px 20px;width:280px;border-radius:14px;border:2px solid #e6e2d8;background:#fdfbf7;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.06);}
.voice-btn{padding:10px 14px;border-radius:50%;border:none;background:#e6e2d8;font-size:18px;}
.suggestions-box{max-width:300px;margin:8px auto 0;background:#fff;border:1px solid #e6e2d8;border-radius:10px;display:none;position:relative;z-index:200;}
.suggestion-item{padding:10px 14px;cursor:pointer;font-size:14px;color:#444;}
#categories{text-align:center;padding:30px 20px 10px;}
.cat-btn{padding:10px 18px;border:none;border-radius:999px;font-weight:600;color:white;margin:6px;font-size:14px;}
.cat-btn[data-cat="baby"]{background:#d8e7f7;color:#3a4a5a;}
.cat-btn[data-cat="tech"]{background:#e8ddf7;color:#4a3f5a;}
.cat-btn[data-cat="home"]{background:#dff2e4;color:#3a5a46;}
.cat-btn[data-cat="gaming"]{background:#f7e4d1;color:#5a463a;}
.cat-btn[data-cat="all"]{background:#f0dff7;color:#4a3a5a;}
