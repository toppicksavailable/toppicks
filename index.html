<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dakota’s Store</title>
<style>
body{margin:0;font-family:sans-serif;background:#faf9f7;color:#333}
header{padding:20px;text-align:center;background:#fff;position:sticky;top:0;z-index:10;box-shadow:0 2px 4px #0001}
#search{width:90%;max-width:500px;padding:10px;border:1px solid #ddd;border-radius:8px}
#categories{display:flex;overflow-x:auto;gap:10px;padding:10px;background:#fff;position:sticky;top:70px;z-index:9}
.cat-btn{padding:8px 14px;border:none;border-radius:20px;background:#eee;cursor:pointer;white-space:nowrap}
.cat-btn.active{background:#c7e8d4}
.products{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:15px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 6px #0001;cursor:pointer;opacity:0;transform:translateY(10px);transition:opacity .3s,transform .3s}
.card.show{opacity:1;transform:translateY(0)}
.card img{width:100%;height:160px;object-fit:cover}
.card .info{padding:10px}
.card .title{font-size:14px;font-weight:600;margin-bottom:6px}
.card .desc{font-size:12px;color:#666;margin-bottom:6px}
.card .price{font-size:12px;color:#444}
#nores{text-align:center;padding:20px;display:none}
</style>
</head><body>

<header>
<h2>Dakota’s Store</h2>
<input id="search" placeholder="Search products...">
</header>

<section id="categories">
<button class="cat-btn active" data-cat="all">All</button>
<button class="cat-btn" data-cat="baby">Baby</button>
<button class="cat-btn" data-cat="tech">Tech</button>
<button class="cat-btn" data-cat="home">Home</button>
<button class="cat-btn" data-cat="gaming">Gaming</button>
<button class="cat-btn" data-cat="budget">Budget Friendly</button>
<button class="cat-btn" data-cat="top">Top Selling</button>
</section>

<div id="nores">No products found</div>
<section class="products" id="grid"></section>

<script>
// =========================
// PRODUCT DATA (ADD 160 HERE)
// =========================
const PRODUCTS=[
/*
{
  "cat":"baby",
  "title":"Short Clean Title",
  "img":"https://m.media-amazon.com/images/I/IMAGE_ID.jpg",
  "desc":"One sentence medium description.",
  "price":"Price varies",
  "url":"https://amazon.com/dp/ASIN?tag=dcsales10-20",
  "priceTag":"budget",
  "rankTag":"top"
},
*/
];

// =========================
// STATE
// =========================
let currentCat="all",term="";

// =========================
// RENDER PRODUCTS
// =========================
function render(){
  const grid=document.getElementById("grid");
  grid.innerHTML="";
  let count=0;
  PRODUCTS.forEach(p=>{
    const t=(p.title+p.desc).toLowerCase();
    const okTxt=t.includes(term);
    const okCat=(currentCat==="all"
      || p.cat===currentCat
      || (currentCat==="budget" && p.priceTag==="budget")
      || (currentCat==="top" && p.rankTag==="top"));
    if(okTxt && okCat){
      count++;
      const c=document.createElement("div");
      c.className="card";
      c.onclick=()=>location.href=p.url;
      c.innerHTML=`
        <img src="${p.img}">
        <div class="info">
          <div class="title">${p.title}</div>
          <div class="desc">${p.desc}</div>
          <div class="price">${p.price}</div>
        </div>`;
      grid.appendChild(c);
      requestAnimationFrame(()=>c.classList.add("show"));
    }
  });
  document.getElementById("nores").style.display=count? "none":"block";
}

// =========================
// CATEGORY FILTER
// =========================
document.querySelectorAll(".cat-btn").forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll(".cat-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentCat=btn.dataset.cat;
    render();
  };
});

// =========================
// SEARCH
// =========================
document.getElementById("search").oninput=e=>{
  term=e.target.value.toLowerCase();
  render();
};

// INITIAL RENDER
render();
</script>

</body></html>
